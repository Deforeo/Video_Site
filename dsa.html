    <title>I LOVE YOU BABY — Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        :root {
            --orange: #ffae42;
            --pink: #ffb8c6;
            --dark-text: #2c1a00;
            --accent: #ff2a6d;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            transition: background-color 0.4s ease;
            font-family: 'Montserrat', sans-serif;
        }

        body.bg-orange { background-color: var(--orange); }
        body.bg-pink { background-color: var(--pink); }

        #stage {
            position: relative;
            width: 100vw; height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }

        /* ---------- КОНТЕЙНЕР (Позиция и Появление) ---------- */
        .word {
            position: absolute;
            opacity: 0;
            transform: translate(-50%, -50%); /* Базовая позиция */
            z-index: 30;
            pointer-events: none;
        }

        .word.appear {
            animation: fadeUp 0.4s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; margin-top: 20px; }
            100% { opacity: 1; margin-top: 0; }
        }

        /* ---------- ВНУТРЕННИЙ ЭЛЕМЕНТ (Стили и Эффекты) ---------- */
        .word-inner {
            display: block;
            color: var(--dark-text);
            text-align: center;
            white-space: nowrap;
            filter: drop-shadow(3px 3px 0 white);
            font-weight: 900;
            transition: color 0.2s ease;
        }

        /* Караоке подскок */
        .karaoke {
            color: var(--accent) !important;
            animation: karaokeBump 0.3s ease-out;
        }
        @keyframes karaokeBump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Пульсация для STAY! и YOOOO... */
        .pulse-shake {
            animation: pulseShake 0.6s ease-in-out infinite alternate !important;
        }
        @keyframes pulseShake {
            0% { transform: scale(1) rotate(0deg); color: var(--dark-text); }
            100% { transform: scale(1.2) rotate(3deg); color: var(--accent); text-shadow: 0 0 10px #ff3388; }
        }

        .shake { animation: shakeAnim 0.15s infinite alternate; }
        @keyframes shakeAnim {
            from { transform: translateX(-2px) rotate(-0.5deg); }
            to { transform: translateX(2px) rotate(0.5deg); }
        }

        .size-l { font-size: clamp(3.5rem, 14vw, 9.5rem); }
        .size-m { font-size: clamp(2rem, 7vw, 5.5rem); font-weight: 800; }

        .baby-force {
            font-family: 'Permanent Marker', cursive !important;
            font-size: clamp(6rem, 20vw, 14rem) !important;
            color: #ff1a6e !important;
            -webkit-text-stroke: 2px white !important;
            text-shadow: 0 0 15px #ff66aa, 0 0 30px #ff3388 !important;
            animation: babyBounce 0.5s infinite alternate ease-in-out !important;
            z-index: 999 !important;
        }
        @keyframes babyBounce {
            from { transform: scale(0.96) rotate(-3deg); }
            to { transform: scale(1.08) rotate(3deg); }
        }

        .final-glow {
            font-size: clamp(3rem, 14vw, 9rem) !important;
            background: linear-gradient(135deg, #fff1b5, #ffae42, #ff5e7e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent !important;
            filter: drop-shadow(0 0 10px rgba(255,100,0,0.7));
            width: 90vw;
            animation: pulseGlow 0.8s infinite alternate;
        }
        @keyframes pulseGlow {
            from { transform: scale(0.98); }
            to { transform: scale(1.05); }
        }

        /* ---------- ФОТО ---------- */
        .photo-item {
            position: absolute;
            width: 400px; max-width: 80vw;
            background: white; padding: 14px 14px 24px 14px;
            border-radius: 8px;
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.3);
            animation: photoFly 0.5s cubic-bezier(0.2, 1.1, 0.4, 1) forwards;
            z-index: 10;
        }
        @keyframes photoFly {
            to { opacity: 1; transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)); }
        }

        .fade-out { animation: fadeOut 0.3s forwards !important; }
        @keyframes fadeOut { to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } }

        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at 40% 30%, #ffc285, #ff9800);
            z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .start-btn { font-size: 2rem; font-weight: 900; color: white; border: 3px solid white; padding: 1rem 2rem; border-radius: 50px; background: rgba(0,0,0,0.1); backdrop-filter: blur(5px); }
    </style>

        function addPhoto() {
            const idx = Math.floor(Math.random() * imageList.length);
            const img = document.createElement('img');
            img.src = imageList[idx];
            img.className = 'photo-item';
            img.style.setProperty('--rot', `${Math.random() * 20 - 10}deg`);
            img.style.setProperty('--scl', 0.8 + Math.random() * 0.4);
            img.style.left = `${10 + Math.random() * 80}%`;
            img.style.top = `${10 + Math.random() * 80}%`;
            stage.appendChild(img);
        }

        function clearStage() {
            [...stage.children].forEach(child => {
                child.classList.add('fade-out');
                setTimeout(() => child.remove(), 300);
            });
        }

        let lastIndex = -1;
        function addWord(ev) {
            const wrapper = document.createElement('div');
            wrapper.className = `word appear`;
            wrapper.style.left = `${ev.x}%`;
            wrapper.style.top = `${ev.y}%`;

            const inner = document.createElement('span');
            inner.innerText = ev.txt;
            inner.className = `word-inner ${ev.style}`;
            if (ev.style.includes('shake')) inner.classList.add('shake');
            
            wrapper.appendChild(inner);
            stage.appendChild(wrapper);

            // Эффекты
            if (ev.special) {
                setTimeout(() => inner.classList.add('pulse-shake'), 50);
            } else if (!ev.style.includes('baby-force') && !ev.style.includes('final-glow')) {
                setTimeout(() => inner.classList.add('karaoke'), 50);
            }
        }

        function sync() {
            const now = audio.currentTime;
            let idx = -1;
            for (let i = 0; i < sequence.length; i++) {
                if (now >= sequence[i].t) idx = i;
                else break;
            }
            if (idx !== -1 && idx !== lastIndex) {
                const ev = sequence[idx];
                if (ev.clear) clearStage();
                if (ev.photo && Math.random() < 0.6) addPhoto();
                addWord(ev);
                if (ev.bg) document.body.className = `bg-${ev.bg}`;
                lastIndex = idx;
            }
            requestAnimationFrame(sync);
        }

        window.startShow = function() {
            document.getElementById('overlay').style.display = 'none';
            audio.play();
            sync();
        };
