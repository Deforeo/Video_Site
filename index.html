<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>I LOVE YOU BABY — Fixed Text</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        :root {
            --orange: #ffae42;
            --pink: #ffb8c6;
            --dark-text: #2c1a00;
            --accent: #ff2a6d;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            transition: background-color 0.4s ease;
            font-family: 'Montserrat', sans-serif;
        }

        body.bg-orange { background-color: var(--orange); }
        body.bg-pink { background-color: var(--pink); }

        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; pointer-events: none; }

        /* ---------- КОНТЕЙНЕР (Позиция и Появление) ---------- */
        .word {
            position: absolute;
            z-index: 30;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px); }
            100% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
        }
        .word.appear { animation: fadeUp 0.4s ease-out forwards; }

        /* ---------- ВНУТРЕННИЙ ТЕКСТ (Эффекты) ---------- */
        .word-inner {
            display: block;
            color: var(--dark-text);
            text-align: center;
            white-space: nowrap;
            filter: drop-shadow(3px 3px 0 white);
            font-weight: 900;
            /* Общая анимация "дыхания" для всего текста */
            animation: textBreathing 2s infinite alternate ease-in-out;
        }

        @keyframes textBreathing {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        /* КАРАОКЕ-ПОДСВЕТКА */
        .karaoke {
            color: var(--accent) !important;
            text-shadow: 0 0 8px #ff66aa;
            transition: 0.2s;
        }

        /* СПЕЦЭФФЕКТ ДЛЯ STAY! */
        .pulse-shake {
            animation: pulseShake 0.6s ease-in-out infinite alternate !important;
        }
        @keyframes pulseShake {
            0% { transform: scale(1) rotate(0deg); color: var(--dark-text); }
            100% { transform: scale(1.15) rotate(2deg); color: var(--accent); }
        }

        /* ФИКС ФИНАЛЬНОГО YOOOOOOOU (Стабильный и мощный) */
        .final-yell {
            animation: finalExpand 0.8s infinite alternate ease-in-out !important;
            display: inline-block;
            color: var(--accent) !important;
            text-shadow: 0 0 20px #ff3388 !important;
        }
        @keyframes finalExpand {
            from { transform: scale(1); }
            to { transform: scale(1.1); filter: brightness(1.2); }
        }

        .shake { animation: shakeAnim 0.15s infinite alternate; }
        @keyframes shakeAnim {
            from { transform: translateX(-2px); }
            to { transform: translateX(2px); }
        }

        .size-l { font-size: clamp(3.5rem, 14vw, 9.5rem); }
        .size-m { font-size: clamp(2rem, 7vw, 5.5rem); font-weight: 800; }

        .baby-force {
            font-family: 'Permanent Marker', cursive !important;
            font-size: clamp(6rem, 20vw, 14rem) !important;
            color: #ff1a6e !important;
            -webkit-text-stroke: 2px white !important;
            animation: babyBounce 0.5s infinite alternate ease-in-out !important;
        }
        @keyframes babyBounce {
            from { transform: scale(0.96) rotate(-3deg); }
            to { transform: scale(1.08) rotate(3deg); }
        }

        .final-glow {
            font-size: clamp(3rem, 14vw, 9rem) !important;
            background: linear-gradient(135deg, #fff1b5, #ffae42, #ff5e7e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            animation: pulseGlow 0.8s infinite alternate !important;
        }
        @keyframes pulseGlow {
            from { transform: scale(0.98); }
            to { transform: scale(1.05); }
        }

        /* ---------- ФОТО (БЕЗ ИЗМЕНЕНИЙ) ---------- */
        .photo-item {
            position: absolute; width: 400px; max-width: 80vw;
            background: white; padding: 14px 14px 24px 14px;
            border-radius: 8px; box-shadow: 0 25px 35px -12px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.3);
            animation: photoFly 0.5s cubic-bezier(0.2, 1.1, 0.4, 1) forwards, gentleFloat 4s infinite alternate;
        }
        @keyframes photoFly { to { opacity: 1; transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)); } }
        @keyframes gentleFloat {
            from { transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)) translateY(0); }
            to { transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)) translateY(-12px); }
        }

        .fade-out { animation: fadeOut 0.3s forwards !important; }
        @keyframes fadeOut { to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } }

        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at 40% 30%, #ffc285, #ff9800);
            z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .start-btn { font-size: 2.5rem; font-weight: 900; color: white; border: 3px solid white; padding: 1rem 2.5rem; border-radius: 70px; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Permanent+Marker&display=swap" rel="stylesheet">

            { t: 34.00, txt: "YOOOOOOOOOOOOOU", clear: false, style: "size-l", x: 48, y: 70, bg: "pink", photo: true, special: "final" }
        ];

        let lastPhotoIndices = [];
        function addPhoto() {
            if (!imageList.length) return;
            let available = imageList.filter((_, i) => !lastPhotoIndices.includes(i));
            if (!available.length) { lastPhotoIndices = []; available = imageList; }
            const idx = imageList.indexOf(available[Math.floor(Math.random() * available.length)]);
            lastPhotoIndices.push(idx); 
            if (lastPhotoIndices.length > 5) lastPhotoIndices.shift();

            const img = document.createElement('img');
            
            // ВОТ ТУТ ДОБАВИЛ ПАПКУ:
            img.src = 'resurce/' + imageList[idx]; 
            
            img.className = 'photo-item';
            img.style.setProperty('--rot', `${Math.random() * 24 - 12}deg`);
            img.style.setProperty('--scl', 0.7 + Math.random() * 0.6);
            img.style.left = `${10 + Math.random() * 80}%`;
            img.style.top = `${10 + Math.random() * 80}%`;
            stage.appendChild(img);
        }

        function addWord(ev) {
            const wrapper = document.createElement('div');
            wrapper.className = `word appear`;
            wrapper.style.left = `${ev.x}%`; wrapper.style.top = `${ev.y}%`;

            const inner = document.createElement('span');
            inner.innerText = ev.txt;
            inner.className = `word-inner ${ev.style}`;
            if (ev.style.includes('shake')) inner.classList.add('shake');
            
            // Специальный фикс для последнего длинного слова
            if (ev.special === "final") inner.classList.add('final-yell');

            wrapper.appendChild(inner);
            stage.appendChild(wrapper);

            if (ev.special === true) {
                setTimeout(() => inner.classList.add('pulse-shake'), 50);
            } else if (ev.style !== 'baby-force' && ev.style !== 'final-glow' && ev.special !== "final") {
                setTimeout(() => {
                    inner.classList.add('karaoke');
                    setTimeout(() => inner.classList.remove('karaoke'), 400);
                }, 50);
            }
        }

        function clearStage() {
            [...stage.children].forEach(child => {
                child.classList.add('fade-out');
                setTimeout(() => child.remove(), 300);
            });
        }

        let lastIndex = -1;
        let isActive = false;
        function sync() {
            if (!isActive) return;
            const now = audio.currentTime;
            let idx = -1;
            for (let i = 0; i < sequence.length; i++) { if (now >= sequence[i].t) idx = i; else break; }
            if (idx !== -1 && idx !== lastIndex) {
                const ev = sequence[idx];
                if (ev.clear) clearStage();
                if (ev.photo && Math.random() < 0.5) addPhoto();
                addWord(ev);
                if (ev.bg) document.body.className = `bg-${ev.bg}`;
                lastIndex = idx;
            }
            requestAnimationFrame(sync);
        }

        window.startShow = function() {
            document.getElementById('overlay').remove();
            audio.play().then(() => {
                isActive = true;
                setInterval(() => { if(isActive) addPhoto() }, 1300);
                sync();
            });
        };
        
        imageList.forEach(src => { 
            const img = new Image(); 
            img.src = 'resurce/' + src; 
        });
    })();
