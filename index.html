<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>I LOVE YOU BABY — Smart Responsive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --orange: #ffae42;
            --pink: #ffb8c6;
            --dark-text: #2c1a00;
            --accent: #ff2a6d;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: background-color 0.4s ease;
            font-family: 'Montserrat', sans-serif;
        }

        body.bg-orange { background-color: var(--orange); }
        body.bg-pink { background-color: var(--pink); }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }

        /* ---------- ДИНАМИЧНОЕ ВЫЛЕТАНИЕ СЛОВ ---------- */
        .word {
            position: absolute;
            z-index: 30;
            transform: translate(-50%, -50%);
            opacity: 0;
            will-change: transform, opacity;
            max-width: calc(100vw - 40px);
            box-sizing: border-box;
        }

        @keyframes wordPopIn {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.2) rotate(-12deg); 
            }
            60% {
                transform: translate(-50%, -50%) scale(1.18) rotate(3deg);
            }
            100% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1) rotate(0deg); 
            }
        }
        .word.appear { 
            animation: wordPopIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        /* ---------- УСИЛЕННОЕ ПОСТОЯННОЕ ДЫХАНИЕ ТЕКСТА ---------- */
        .word-inner {
            display: block;
            color: var(--dark-text);
            text-align: center;
            white-space: nowrap;
            filter: drop-shadow(4px 4px 0 rgba(255,255,255,0.8));
            font-weight: 900;
            /* Дыхание теперь глубокое (до 1.12x) и очень живое */
            animation: textBreathing 1.4s infinite alternate ease-in-out;
        }

        @keyframes textBreathing {
            from { transform: scale(0.92); }
            to { transform: scale(1.12); } 
        }

        /* Эффект подсветки караоке */
        .karaoke {
            color: var(--accent) !important;
            text-shadow: 0 0 10px #ff66aa;
            transition: color 0.2s, text-shadow 0.2s;
        }

        /* Пульсирующая встряска для ключевых слов (STAY!) */
        .pulse-shake {
            animation: pulseShake 0.5s ease-in-out infinite alternate !important;
        }
        @keyframes pulseShake {
            0% { transform: scale(1) rotate(-2deg); color: var(--dark-text); }
            100% { transform: scale(1.22) rotate(2deg); color: var(--accent); text-shadow: 0 0 15px #ff3388; }
        }

        /* Финальный крик */
        .final-yell {
            animation: finalExpand 0.6s infinite alternate ease-in-out !important;
            display: inline-block; 
            color: var(--accent) !important;
            text-shadow: 0 0 25px #ff3388 !important;
        }
        @keyframes finalExpand { 
            from { transform: scale(0.95); } 
            to { transform: scale(1.2); } 
        }

        .shake { animation: shakeAnim 0.1s infinite alternate; }
        @keyframes shakeAnim { 
            from { transform: translateX(-3px); } 
            to { transform: translateX(3px); } 
        }

        /* Размеры шрифтов */
        .size-l { font-size: clamp(3.5rem, 13vw, 9.5rem); }
        .size-m { font-size: clamp(2rem, 7.5vw, 5.5rem); font-weight: 800; }

        /* Стиль для BABY */
        .baby-force {
            font-family: 'Permanent Marker', cursive !important;
            font-size: clamp(5.5rem, 19vw, 13.5rem) !important;
            color: #ff1a6e !important;
            -webkit-text-stroke: 2px white !important;
            text-shadow: 0 0 15px #ff66aa, 0 0 30px #ff3388 !important;
            animation: babyBounce 0.45s infinite alternate ease-in-out !important;
        }
        @keyframes babyBounce { 
            from { transform: scale(0.9) rotate(-4deg); } 
            to { transform: scale(1.1) rotate(4deg); } 
        }

        /* Финальный градиент */
        .final-glow {
            font-size: clamp(3rem, 13vw, 9rem) !important;
            background: linear-gradient(135deg, #fff, #ffae42, #ff2a6d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent !important;
            animation: pulseGlow 0.6s infinite alternate !important;
        }
        @keyframes pulseGlow { 
            from { transform: scale(0.94); } 
            to { transform: scale(1.12); } 
        }

        /* ---------- ФОТО (Красивый хаос на фоне) ---------- */
        .photo-item {
            position: absolute; 
            width: 380px; 
            max-width: 75vw;
            height: auto;
            max-height: 60vh;
            object-fit: cover;
            background: white; 
            padding: 12px 12px 22px 12px;
            border-radius: 6px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
            opacity: 0;
            transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.3);
            animation: photoFly 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards, gentleFloat 4s infinite alternate;
            will-change: transform;
            z-index: 10;
        }
        @keyframes photoFly { 
            to { opacity: 1; transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)); } 
        }
        @keyframes gentleFloat {
            from { transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)) translateY(0); }
            to { transform: translate(-50%, -50%) rotate(var(--rot)) scale(var(--scl)) translateY(-10px); }
        }


        .photo-rain {
            position: absolute; width: 220px; max-width: 45vw;
            background: white; padding: 10px 10px 20px 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 5; 
            top: -350px; /* Выше экрана */
            left: var(--x);
            animation: fallDown var(--dur) linear forwards;
            pointer-events: none;
        }

        @keyframes fallDown {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(calc(100vh + 500px)) rotate(var(--end-rot)); opacity: 0; }
        }

        .fade-out { animation: fadeOut 0.3s forwards !important; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.85); } }

        /* ---------- СТИЛЬНАЯ КНОПКА СТАРТА (Морфизм + Свечение) ---------- */
        #overlay {
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #ffae42 0%, #ff5e7e 100%);
            z-index: 1000; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.5s;
        }
        .start-btn { 
            font-size: clamp(1.5rem, 6vw, 2.8rem); 
            font-weight: 900; 
            color: white; 
            border: 2px solid rgba(255,255,255,0.4); 
            padding: 1.2rem 3rem; 
            border-radius: 100px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.1);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            animation: btnPulse 2s infinite;
        }
        .start-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(255, 42, 109, 0.4);
            border-color: white;
        }
        @keyframes btnPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @media (max-width: 680px) {
            .word-inner { white-space: normal; width: 90vw; }
            .baby-force { font-size: clamp(4rem, 16vw, 9rem) !important; -webkit-text-stroke: 1px white !important; }
            .photo-item { width: 260px; }
        }
    </style>

        let currentPhotoIdx = 0;
        function getNextPhotoSrc() {
            const src = 'resurce/' + imageList[currentPhotoIdx];
            currentPhotoIdx = (currentPhotoIdx + 1) % imageList.length;

        }

        let lastPhotoIndices = [];
        function addPhoto() {
            if (!imageList.length) return;
            let available = imageList.filter((_, i) => !lastPhotoIndices.includes(i));
            if (!available.length) { lastPhotoIndices = []; available = imageList; }
            const idx = imageList.indexOf(available[Math.floor(Math.random() * available.length)]);

        // ДОЖДЬ ИЗ ФОТО (ДЛЯ ФИНАЛА)
        function spawnRainPhoto() {
            if (!imageList.length) return;
            let available = imageList.filter((_, i) => !lastPhotoIndices.includes(i));
            if (!available.length) { lastPhotoIndices = []; available = imageList; }
            const idx = imageList.indexOf(available[Math.floor(Math.random() * available.length)]);
            lastPhotoIndices.push(idx); if (lastPhotoIndices.length > 5) lastPhotoIndices.shift();

            const img = document.createElement('img');
            img.src = 'resurce/' + imageList[idx];;
            img.className = 'photo-rain';
            
            const duration = 2 + Math.random() * 1.5; // Скорость падения
            img.style.setProperty('--x', `${Math.random() * 100}vw`);
            img.style.setProperty('--dur', `${duration}s`);
            img.style.setProperty('--end-rot', `${Math.random() * 720 - 360}deg`);
            
            stage.appendChild(img);

            // САМОУДАЛЕНИЕ: чистим систему, как только картинка улетела
            setTimeout(() => {
                img.remove();
            }, duration * 1000);
        }

        function startPhotoRain() {
            const rainInterval = setInterval(() => {
                if (!isActive) { clearInterval(rainInterval); return; }
                spawnRainPhoto();
            }, 180); // Частота появления
        }

        function addWord(ev) {
            const wrapper = document.createElement('div');
            wrapper.className = `word appear`;
            // Устанавливаем стартовое позиционирование
            wrapper.style.left = `${ev.x}%`; 
            wrapper.style.top = `${ev.y}%`;

            const inner = document.createElement('span');
            inner.innerText = ev.txt;
            inner.className = `word-inner ${ev.style}`;
            if (ev.style.includes('shake')) inner.classList.add('shake');
            if (ev.special === "final") inner.classList.add('final-yell');
            if (ev.special === "final") {
                startPhotoRain();
            }
            if (ev.special === true) setTimeout(() => inner.classList.add('pulse-shake'), 50);

            wrapper.appendChild(inner);
            stage.appendChild(wrapper);


            // ---------- УМНАЯ КОРРЕКЦИЯ ВЫХОДА ЗА ГРАНИЦЫ (DYN-BOUNDS) ----------
            const w = wrapper.offsetWidth || wrapper.clientWidth;
            const h = wrapper.offsetHeight || wrapper.clientHeight;
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const pad = 20; // Безопасный барьер в 20px от краев экрана

            let posX = (ev.x / 100) * screenW;
            let posY = (ev.y / 100) * screenH;

            // Если слово шире всего экрана, центрируем его
            if (w > screenW - 2 * pad) {
                posX = screenW / 2;
            } else {
                const leftEdge = posX - w / 2;
                const rightEdge = posX + w / 2;
                
                if (leftEdge < pad) {
                    posX += (pad - leftEdge);
                } else if (rightEdge > screenW - pad) {
                    posX -= (rightEdge - (screenW - pad));
                }
            }

            // Если слово выше экрана, центрируем по вертикали
            if (h > screenH - 2 * pad) {
                posY = screenH / 2;
            } else {
                const topEdge = posY - h / 2;
                const bottomEdge = posY + h / 2;

                if (topEdge < pad) {
                    posY += (pad - topEdge);
                } else if (bottomEdge > screenH - pad) {
                    posY -= (bottomEdge - (screenH - pad));
                }
            }

            // Фиксируем пиксельную идеальную координату
            wrapper.style.left = `${posX}px`;
            wrapper.style.top = `${posY}px`;
            // ------------------------------------------------------------------

            // Караоке эффект
            const isSpecial = ev.special === true || ev.special === "final";
            const isBaby = ev.style === 'baby-force';
            const isFinalGlow = ev.style === 'final-glow';
            
            if (!isSpecial && !isBaby && !isFinalGlow) {
                setTimeout(() => {
                    inner.classList.add('karaoke');
                    setTimeout(() => inner.classList.remove('karaoke'), 350);
                }, 50);
            }

        }

        function clearStage() {
            [...stage.children].forEach(child => {
                if (!child.classList.contains('photo-rain')) { // Дождь не чистим, он сам удалится
                    child.classList.add('fade-out');
                    setTimeout(() => child.remove(), 300);
                }
            });
        }

        let lastIndex = -1;
        let isActive = false;
        let animFrame = null;
        let photoInterval = null;

        function sync() {
            if (!isActive) return;
            const now = audio.currentTime;
            let idx = -1;
            for (let i = 0; i < sequence.length; i++) { if (now >= sequence[i].t) idx = i; else break; }
            if (idx !== -1 && idx !== lastIndex) {
                const ev = sequence[idx];
                if (ev.clear) clearStage();
                if (ev.photo && Math.random() < 0.5) addPhoto();
                addWord(ev);
                if (ev.bg) changeTheme(ev.bg);
                if (ev.txt.toLowerCase() === 'baby') changeTheme('pink');
                lastIndex = idx;
            }
            // if (now >= sequence[sequence.length-1].t + 3 || audio.ended) {
            //     if (animFrame) cancelAnimationFrame(animFrame);
            //     if (photoInterval) clearInterval(photoInterval);
            //     isActive = false;
            //     return;
            // }
            animFrame = requestAnimationFrame(sync);
        }

        window.startShow = function() {
            if (isActive) return;
            const ov = document.getElementById('overlay');
            ov.style.opacity = '0';
            setTimeout(() => ov.remove(), 500);
            clearStage();
            lastIndex = -1;
            audio.currentTime = 0;
            audio.play().then(() => {
                isActive = true;
                setInterval(() => { if(isActive && lastIndex < sequence.length - 1) addPhoto() }, 1300);
                // photoInterval = setInterval(() => { if(isActive) addPhoto() }, 1300);
                sync();
            }).catch(() => {
                audio.play().then(() => {
                    isActive = true;
                    setInterval(() => { if(isActive && lastIndex < sequence.length - 1) addPhoto() }, 1300);
                    // photoInterval = setInterval(() => { if(isActive) addPhoto() }, 1300);
                    sync();
                });
            });
        };

        // Предзагрузка фоточек из твоей папки resurce
        imageList.forEach(src => { (new Image()).src = 'resurce/' + src; });
    })();
</script>
</body>
</html>
